<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F5C518" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="POS Hellom" />
    <link rel="apple-touch-icon" href="/assets/hellom.png" />

    <!-- App icon -->
    <link rel="icon" type="image/png" href="/assets/hellom.png" />

    <title>Hellom POS</title>

    <!-- Service Worker registration (production only) -->
    <script type="module">
      if ('serviceWorker' in navigator) {
        if (import.meta.env.PROD) {
          window.addEventListener('load', function () {
            navigator.serviceWorker
              .register('/sw.js', { scope: '/' })
              .catch(function (err) {
                console.warn('[SW] Registration failed:', err);
              });
          });
        } else {
          // Dev: never let a stale service worker serve cached bundles — it breaks
          // Vite HMR and can freeze the app on old code. Unregister + purge caches.
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches) {
            caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
